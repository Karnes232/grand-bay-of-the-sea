[build]
  command = "npm run build && node scripts/verify-metadata.mjs"
  publish = ".next"

# Canonical host: single-hop 301s from http/apex straight to https://www
# (previously http://apex needed two hops: ->https://apex ->https://www).
[[redirects]]
  from = "http://grandbay-puntacana.com/*"
  to = "https://www.grandbay-puntacana.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://grandbay-puntacana.com/*"
  to = "https://www.grandbay-puntacana.com/:splat"
  status = 301
  force = true

# Old near-duplicate DR Web Studio post -> canonical 2026 article.
# Lives here (not only next.config) because the next-intl edge middleware
# rewrites paths before next.config redirects are evaluated on Netlify.
[[redirects]]
  from = "/blog/local-businesses/dr-web-studio-punta-cana-web-design"
  to = "/blog/local-businesses/dr-web-studio-punta-cana-website-design"
  status = 301
  force = true

[[redirects]]
  from = "/es/blog/local-businesses/dr-web-studio-punta-cana-web-design"
  to = "/es/blog/local-businesses/dr-web-studio-punta-cana-website-design"
  status = 301
  force = true

# i18n redirects for proper language handling
[[redirects]]
  from = "/"
  to = "/en"
  status = 302
  conditions = {Language = ["en"]}

[[redirects]]
  from = "/"
  to = "/es"
  status = 302
  conditions = {Language = ["es"]}

[[redirects]]
  from = "/"
  to = "/en"
  status = 302

# Image optimization redirects
[[redirects]]
  from = '/_next/image/*'
  query = { q = ':quality', url = ':url', w = ':width' }
  to = '/.netlify/images?url=:url&w=:width&q=:quality'
  status = 200
  force = true

# Force correct MIME types for Next.js static assets (fixes CSS/JS served as text/plain)
[[headers]]
  for = "/_next/static/css/*"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "/_next/static/chunks/*"
  [headers.values]
    Content-Type = "application/javascript"

# Cache headers for better performance
[[headers]]
  for = "/messages/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=86400"

# Do not set Cache-Control on "/*" — it overrides Next.js / Netlify ISR headers and
# forces every HTML request to miss the edge cache (slow TTFB, bad LCP in lab tests).
# SAMEORIGIN matches the value next.config.mjs sends on SSR responses
# (was DENY here, causing conflicting values). X-XSS-Protection is deprecated.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_SHARP_PATH = "./node_modules/sharp"